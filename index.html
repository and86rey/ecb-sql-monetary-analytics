<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Investment PM | SQL Portfolio</title>
    <link rel="stylesheet" href="style.css" />
    <script src="https://cdn.jsdelivr.net"></script>
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body>
    <header class="container">
        <h1>Monetary Policy & Investment Dashboard</h1>
        <div id="status" class="status">Syncing with ECB Official Data...</div>
    </header>

    <main class="container">
        <!-- HR Action Center -->
        <section class="panel" style="border-color: #f5a623;">
            <h2 style="color: #f5a623;">Select Analytical Case (SQL Demo)</h2>
            <div class="controls" id="scenario-controls">
                <button onclick="runScenario('raw')">1. Market Liquidity (Raw)</button>
                <button onclick="runScenario('yoy')">2. Inflation KPI (YoY %)</button>
                <button onclick="runScenario('ma')">3. Trend Smoothing (Moving Avg)</button>
            </div>
        </section>

        <div class="grid">
            <section class="panel">
                <h2>Dynamic Visual</h2>
                <div class="chart-container" style="height: 280px;">
                    <canvas id="main-chart"></canvas>
                </div>
            </section>

            <section class="panel">
                <h2>Business Insights</h2>
                <div id="insight-box" class="small muted">
                    Select a case above to see how SQL transforms raw central bank data into investment insights.
                </div>
            </section>
        </div>

        <section class="panel">
            <h2>Executed SQL Query</h2>
            <div id="sql-display" style="background:#050505; color:#00ff41; padding:15px; font-family:monospace; border-radius:4px; font-size:12px; white-space:pre-wrap;">
                -- SQL code will appear here
            </div>
            
            <div class="tableWrap" id="table-container" style="margin-top:15px;">
                <table id="resultsTable"></table>
            </div>
        </section>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
